# ==============================================================
# Grafana 대시보드 프로바이더 설정
# /var/lib/grafana/dashboards 디렉토리의 JSON 파일을 자동 로드
# ==============================================================

apiVersion: 1

providers:
  - name: "Elasticsearch Lab Dashboards"
    orgId: 1
    folder: "Elasticsearch"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
