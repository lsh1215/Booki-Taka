# ==============================================================
# Kibana 설정 파일 (학습 환경)
# ==============================================================

# 서버 설정
server.host: "0.0.0.0"
server.port: 5601
server.name: "kibana-lab"

# Elasticsearch 연결
elasticsearch.hosts: ["http://es01:9200"]

# ==============================================================
# 보안 설정 비활성화 (로컬 학습 전용)
# ==============================================================
xpack.security.enabled: false

# ==============================================================
# 한국어 로케일 설정
# ==============================================================
i18n.locale: "ko-KR"

# ==============================================================
# 로깅 설정
# ==============================================================
logging:
  appenders:
    file:
      type: file
      fileName: /var/log/kibana/kibana.log
      layout:
        type: json
  root:
    appenders: [default]
    level: info

# ==============================================================
# 모니터링 설정 (학습 환경에서는 비활성화)
# ==============================================================
monitoring.enabled: false
