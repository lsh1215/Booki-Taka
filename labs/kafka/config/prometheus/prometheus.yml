# ==============================================================
# Prometheus 설정 파일
# Kafka 메트릭을 15초마다 수집
# ==============================================================

global:
  scrape_interval: 15s        # 기본 수집 주기
  evaluation_interval: 15s    # 규칙 평가 주기
  scrape_timeout: 10s

# 알림 규칙 파일 (필요시 추가)
rule_files: []

# ==============================================================
# 스크랩 설정
# ==============================================================
scrape_configs:

  # Prometheus 자체 메트릭 수집
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Kafka 메트릭 수집 (kafka-exporter 경유)
  # Consumer group lag, topic/partition 메트릭 포함
  - job_name: "kafka-exporter"
    scrape_interval: 15s
    metrics_path: "/metrics"
    static_configs:
      - targets: ["kafka-exporter:9308"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "kafka-lab-cluster"
